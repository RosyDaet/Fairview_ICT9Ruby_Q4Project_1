    border-radius: 15px;

    padding: 25px;
    height: 180px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);

    background-color: #4CAF50;
